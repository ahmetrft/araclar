<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Global Dashboard Styles (Variables) -->
    <link rel="stylesheet" href="../../style.css">
    <!-- Music Player Specific Styles -->
    <link rel="stylesheet" href="style.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="../../manifest.json">
</head>

<body>
    <header class="app-header glass-panel">
        <div class="header-left">
            <a href="../../index.html" class="back-btn" aria-label="Back to Dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <h1>Müzik Oynatıcısı</h1>
        </div>

        <div class="header-controls">
            <button id="btn-reset-all" class="btn btn-outline" title="Tüm listeyi ve ayarları varsayılana sıfırla"
                style="display: flex; align-items: center; gap: 0.5rem;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                </svg>
                Varsayılana Sıfırla
            </button>
        </div>
    </header>

    <main class="app-main">
        <div class="playlist-container glass-panel">
            <div class="playlist-section">
                <div class="playlist-header">
                    <h3>Oynatma Listesi</h3>
                    <div class="playlist-actions">
                        <button class="btn btn-outline btn-sm" id="btn-add-folder">📂 Klasör Ekle</button>
                        <input type="file" id="input-folder" accept="audio/*" webkitdirectory directory multiple
                            style="display: none;">
                    </div>
                </div>

                <ul class="playlist-list" id="playlist-container">
                    <li class="playlist-empty">Oynatma listeniz şuanda boş.</li>
                </ul>
            </div>
        </div>
    </main>

    <!-- Bottom Player Bar -->
    <div class="bottom-bar glass-panel">
        <!-- Left: Track Info -->
        <div class="bottom-bar-left">
            <div class="track-info" id="track-info-container">
                <div class="now-playing-title-wrapper" id="title-wrapper">
                    <h2 id="current-title" class="marquee-text">Parça seçilmedi</h2>
                </div>
                <p id="current-artist">Başlamak için klasör seçin</p>
            </div>
        </div>

        <!-- Center: Controls -->
        <div class="bottom-bar-center">
            <div class="transport">
                <button class="transport-toggle" id="btn-shuffle" title="Karıştır">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                        <line x1="4" y1="4" x2="9" y2="9"></line>
                    </svg>
                </button>
                <button class="transport-btn" id="btn-prev" title="Önceki Parça">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="19 20 9 12 19 4 19 20"></polygon>
                        <line x1="5" y1="19" x2="5" y2="5"></line>
                    </svg>
                </button>
                <button class="transport-play" id="btn-play-pause" title="Oynat/Duraklat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </button>
                <button class="transport-btn" id="btn-stop" title="Durdur">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    </svg>
                </button>
                <button class="transport-btn" id="btn-next" title="Sonraki Parça">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 4 15 12 5 20 5 4"></polygon>
                        <line x1="19" y1="5" x2="19" y2="19"></line>
                    </svg>
                </button>
                <button class="transport-toggle" id="btn-loop" title="Döngü Modu">
                    <svg id="icon-loop-all" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
            </div>

            <div class="progress-bar-container">
                <span id="time-current">0:00</span>
                <input type="range" id="seek-bar" min="0" max="100" value="0" class="styled-slider seek-slider">
                <span id="time-total">0:00</span>
            </div>
        </div>

        <!-- Right: Extras -->
        <div class="bottom-bar-right">
            <span>🔉</span>
            <input type="range" id="volume-slider" min="0" max="100" value="80" class="styled-slider volume-slider">
        </div>
    </div>
    </main>

    <!-- Audio Element -->
    <audio id="audio-player" style="display: none;"></audio>

    <script src="../../db.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../../sw.js')
                    .then(registration => console.log('ServiceWorker registration successful'))
                    .catch(error => console.log('ServiceWorker registration failed: ', error));
            });
        }
    </script>
</body>

</html>
