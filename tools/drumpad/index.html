<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrumPad Studio</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Global Dashboard Styles (Variables) -->
    <link rel="stylesheet" href="../../style.css">
    <!-- DrumPad Specific Styles -->
    <link rel="stylesheet" href="style.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="../../manifest.json">
</head>

<body>
    <header class="app-header glass-panel">
        <div class="header-left">
            <a href="../../index.html" class="back-btn" aria-label="Back to Dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <h1>DrumPad Stüdyo</h1>
        </div>

        <div class="header-controls" style="display: flex; gap: 1rem; align-items: center;">
            <button id="btn-reset-all" class="btn btn-outline"
                title="Tüm ayarları ve yüklenen sesleri varsayılana sıfırla"
                style="display: flex; align-items: center; gap: 0.5rem; white-space: nowrap;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                </svg>
                Varsayılana Sıfırla
            </button>
            <button id="btn-panic" class="btn btn-danger" title="Tüm sesleri anında durdur">🚨 ACİL DURDUR</button>
        </div>
    </header>

    <main class="app-main">
        <!-- Controls Sidebar -->
        <aside class="controls-panel glass-panel">
            <div class="control-group">
                <h3>Pad Kontrolleri</h3>
                <div class="btn-group-vertical">
                    <button class="btn btn-primary" id="btn-add-files">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 5v14M5 12h14"></path>
                        </svg>
                        Pad Sesleri Ekle
                    </button>
                    <!-- Hidden exact file input to trigger when button is clicked -->
                    <input type="file" id="input-files" accept="audio/*" multiple style="display: none;">

                    <button class="btn btn-danger" id="btn-stop-sfx"
                        style="background: rgba(239, 68, 68, 0.4); border-color: #ef4444; color: white;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        </svg>
                        Pad Sesini Durdur
                    </button>

                    <button class="btn btn-secondary" id="btn-clear-pads">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2">
                            </path>
                        </svg>
                        Padleri Temizle
                    </button>

                    <button class="btn btn-outline" id="btn-edit-mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                        </svg>
                        Padleri Düzenle
                    </button>
                </div>
            </div>

            <div class="control-group">
                <h3>Fon Sesi Seçenekleri</h3>
                <div class="btn-group-vertical">
                    <button class="btn btn-outline" id="btn-add-bg-file">Fon Parçası Seç</button>
                    <input type="file" id="input-bg-file" accept="audio/*" style="display: none;">

                    <div style="display: flex; gap: 0.5rem; flex-direction: column;">
                        <button class="btn btn-toggle" id="btn-toggle-bg" data-state="off"
                            style="padding: 0.75rem 1rem;">
                            <span class="status-indicator"></span>
                            <span>KAPALI</span>
                        </button>
                        <button class="btn btn-outline" id="btn-reset-bg" title="Fon Sıfırla"
                            style="padding: 0.75rem 1rem;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                                <path d="M3 3v5h5" />
                                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                                <path d="M16 21v-5h5" />
                            </svg>
                            Fon Sıfırla
                        </button>
                    </div>

                    <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                        <button class="btn btn-outline" id="btn-fade-in"
                            style="flex: 1; padding: 0.5rem; font-size: 0.8rem; border-color: #34d399; color: #34d399;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M5 19L19 5M5 5v14M19 5v14" opacity="0.5" />
                                <polyline points="5 19 12 12 19 5" />
                            </svg>
                            Artarak Gir
                        </button>
                        <button class="btn btn-outline" id="btn-fade-out"
                            style="flex: 1; padding: 0.5rem; font-size: 0.8rem; border-color: #f87171; color: #f87171;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M5 5l14 14M5 5v14M19 5v14" opacity="0.5" />
                                <polyline points="5 5 12 12 19 19" />
                            </svg>
                            Azalarak Çık
                        </button>
                    </div>
                </div>

                <div class="radio-status" id="bg-status-text">
                    Hiçbir parça seçilmedi
                </div>
            </div>

            <div class="control-group">
                <h3>Ses Motoru Ayarları</h3>

                <div class="slider-wrapper">
                    <div class="slider-header">
                        <label for="slider-sfx-vol">Pad Ses Seviyesi</label>
                        <span id="val-sfx-vol">100%</span>
                    </div>
                    <input type="range" id="slider-sfx-vol" min="0" max="100" value="100" class="styled-slider">
                </div>

                <div class="slider-wrapper">
                    <div class="slider-header">
                        <label for="slider-bg-vol">Fon Ses Seviyesi</label>
                        <span id="val-bg-vol">60%</span>
                    </div>
                    <input type="range" id="slider-bg-vol" min="0" max="100" value="60" class="styled-slider">
                </div>

                <div class="slider-wrapper">
                    <div class="slider-header">
                        <label for="slider-duck">Fon Kısılma (Ducking %)</label>
                        <span id="val-duck">10%</span>
                    </div>
                    <input type="range" id="slider-duck" min="0" max="100" value="10" class="styled-slider">
                </div>

                <div class="slider-wrapper">
                    <div class="slider-header">
                        <label for="slider-fade">Ducking Geçiş Süresi (sn)</label>
                        <span id="val-fade">0.5s</span>
                    </div>
                    <input type="range" id="slider-fade" min="0" max="5.0" step="0.1" value="0.5" class="styled-slider">
                </div>

                <div class="slider-wrapper">
                    <div class="slider-header">
                        <label for="slider-fon-fade" style="color: #cbd5e1;">Fon Geçiş Süresi (sn)</label>
                        <span id="val-fon-fade" style="color: #fca5a5;">3.0s</span>
                    </div>
                    <input type="range" id="slider-fon-fade" min="0.5" max="15.0" step="0.5" value="3.0"
                        class="styled-slider">
                </div>
            </div>
        </aside>

        <!-- Pad Grid Workspace -->
        <section class="workspace glass-panel" style="position: relative;">
            <div id="pad-grid" class="pad-grid">
                <!-- Pads will be generated here -->
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon">🎧</div>
                    <h2>Henüz Pad Yüklenmedi</h2>
                    <p>Ses dosyalarınızı eklemek için "Pad Sesleri Ekle" butonuna tıklayın.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal for notifications -->
    <div id="notification-modal" class="modal">
        <div class="modal-content glass-panel">
            <h2 id="modal-title"></h2>
            <p id="modal-message"></p>
            <button class="btn btn-primary" id="btn-modal-ok">OK</button>
        </div>
    </div>

    <!-- Background Radio Audio Element -->
    <!-- We use normal <audio> for radio to easily scrub and buffer big files, routing it through Web Audio for ducking -->
    <audio id="bg-audio-element" style="display: none;"></audio>

    <script src="../../db.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../../sw.js')
                    .then(registration => console.log('ServiceWorker registration successful'))
                    .catch(error => console.log('ServiceWorker registration failed: ', error));
            });
        }
    </script>
</body>

</html>
